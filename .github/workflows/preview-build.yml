name: Preview Build

on:
  push:
    branches:
      - "preview/**"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1.307.0
        with:
          ruby-version: '3.4'
          bundler-cache: true
          cache-version: 0
      
      - name: Build with Jekyll
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production
      
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: preview-site-${{ github.run_number }}
          path: _site/
          retention-days: 7
      
      - name: Build summary
        run: |
          echo "## ✅ Preview Build Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Download Preview" >> $GITHUB_STEP_SUMMARY
          echo "Download the built site artifact from the Actions run to preview locally:" >> $GITHUB_STEP_SUMMARY
          echo "1. Download the \`preview-site-${{ github.run_number }}\` artifact" >> $GITHUB_STEP_SUMMARY
          echo "2. Extract and serve with: \`python3 -m http.server 4000\`" >> $GITHUB_STEP_SUMMARY
          echo "3. Visit: http://localhost:4000" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🚀 To Deploy This Preview" >> $GITHUB_STEP_SUMMARY
          echo "Merge this branch to \`master\` to deploy to production." >> $GITHUB_STEP_SUMMARY
